name: Build Excalidraw App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install --save-dev sharp
      - name: Generate icon
        shell: bash
        run: |
          node -e "
          const sharp = require('sharp');
          const size = 512;
          const svg = \`<svg xmlns='http://www.w3.org/2000/svg' width='\${size}' height='\${size}'><rect width='\${size}' height='\${size}' rx='100' fill='#6965db'/><text x='50%' y='54%' font-size='280' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='Arial'>✏</text></svg>\`;
          sharp(Buffer.from(svg)).png().toFile('assets/icon.png');
          "
      - run: npm run build
        shell: bash
      - run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Excalidraw-Windows
          path: dist/Excalidraw.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install --save-dev sharp
      - name: Generate icon
        run: |
          node -e "
          const sharp = require('sharp');
          const size = 512;
          const svg = \`<svg xmlns='http://www.w3.org/2000/svg' width='\${size}' height='\${size}'><rect width='\${size}' height='\${size}' rx='100' fill='#6965db'/><text x='50%' y='54%' font-size='280' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='Arial'>✏</text></svg>\`;
          sharp(Buffer.from(svg)).png().toFile('assets/icon.png');
          "
      - run: npm run build
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Excalidraw-Mac
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install --save-dev sharp
      - name: Generate icon
        run: |
          node -e "
          const sharp = require('sharp');
          const size = 512;
          const svg = \`<svg xmlns='http://www.w3.org/2000/svg' width='\${size}' height='\${size}'><rect width='\${size}' height='\${size}' rx='100' fill='#6965db'/><text x='50%' y='54%' font-size='280' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='Arial'>✏</text></svg>\`;
          sharp(Buffer.from(svg)).png().toFile('assets/icon.png');
          "
      - run: npm run build
      - run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Excalidraw-Linux
          path: dist/*.AppImage

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          name: Excalidraw v${{ github.run_number }}
          files: |
            artifacts/Excalidraw-Windows/Excalidraw.exe
            artifacts/Excalidraw-Mac/*.dmg
            artifacts/Excalidraw-Linux/*.AppImage